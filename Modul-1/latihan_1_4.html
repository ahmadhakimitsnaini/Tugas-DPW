<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Dasar</title>
</head>
<body>
    <!-- Ordered list -->
     <ol type="1">
        <li>Jenis buah : </li>
        <li>Jenis makanan : </li>
        <li>Gender : </li>
     </ol>

     <!-- Unordered list -->
      <ul>
        <li>Apel</li>
        <li>Nanas</li>
        <li>Jeruk</li>
        <li>Anggur</li>
      </ul>

      <!-- Nested list -->
       <ol type="A">
        <li> Jenis buah : 
            <ul>
                <li>Apel</li>
                <li>Nanas</li>
            </ul>
        </li>
        <li>Jenis makanan : 
            <ol type="1">
                <li>Nasi Goreng</li>
                <li>Nasi Pecel</li>
                <li>Soto Ayam</li>
            </ol>
        </li>
        <li>Gender : 
            <ol type="a">
                <li>Laki-laki</li>
                <li>Perempuan</li>
            </ol>
        </li>
       </ol>
</body>
</html>
