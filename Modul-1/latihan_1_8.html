<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Dasar</title>
    <style>
        /* Gaya dasar tabel agar persis seperti gambar */
        table {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            margin: 20px auto;
        }
        
        /* Memberikan garis border hitam pada tabel */
        th, td {
            border: 1px solid black;
            padding: 8px 12px;
            font-size: 16px;
        }
        
        /* Gaya untuk Header "Biodata" */
        th {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            padding: 10px;
        }
        
        /* Gaya khusus untuk kolom Foto */
        .foto-cell {
            text-align: center;
            vertical-align: middle;
            width: 25%;
        }
        
        /* Mengatur lebar kolom label dan isi */
        .label-cell {
            width: 15%;
        }
        
        .value-cell {
            width: 60%;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th colspan="3">Biodata</th>
        </tr>

        <tr>
            <td rowspan="5" class="foto-cell">Foto</td>
            <td class="label-cell">Nim</td>
            <td class="value-cell">: 253307054</td>
        </tr>
        <tr>
            <td class="label-cell">Nama</td>
            <td class="value-cell">: Ahmad Hakim Itsnaini</td>
        </tr>
        <tr>
            <td class="label-cell">Alamat</td>
            <td class="value-cell">: Madiun</td>
        </tr>
        <tr>
            <td class="label-cell">TTL</td>
            <td class="value-cell">: 16 Januari 2006</td>
        </tr>
        <tr>
            <td class="label-cell">Kelas</td>
            <td class="value-cell">: 2B</td>
        </tr>

        <tr>
            <td rowspan="5" class="foto-cell">Foto</td>
            <td class="label-cell">Nim</td>
            <td class="value-cell">: 253307054</td>
        </tr>
        <tr>
            <td class="label-cell">Nama</td>
            <td class="value-cell">: Ahmad Hakim Itsnaini</td>
        </tr>
        <tr>
            <td class="label-cell">Alamat</td>
            <td class="value-cell">: Madiun</td>
        </tr>
        <tr>
            <td class="label-cell">TTL</td>
            <td class="value-cell">: 16 Januari 2006</td>
        </tr>
        <tr>
            <td class="label-cell">Kelas</td>
            <td class="value-cell">: 2B</td>
        </tr>
    </table>

</body>
</html>
